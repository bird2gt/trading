name: Daily Forecaster Digest

on:
  schedule:
    - cron: '0,30 6-20 * * *'  # every 30 min, 9:00–23:30 Kyiv (UTC+3)
  workflow_dispatch:       # manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests feedparser python-dotenv

      - name: Run digest
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m analytics.digest

      - name: Commit digest (marks today as sent)
        run: |
          if [ -n "$(git status --porcelain forecasts/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add forecasts/
            git commit -m "Add $(date -u +%F) forecaster digest"
            git push
          else
            echo "No new digest file — nothing to commit."
          fi
